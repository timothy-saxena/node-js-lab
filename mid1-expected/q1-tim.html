<!doctype html>
<html>
    <head>
        <title>Tim try for q1</title>
        <style>
            body {
                font-family: "Times New Roman", Times, serif;
                background-color: aliceblue;
            }

            .container {
                width: 300px;
                margin: auto;
                margin-top: 100px;
                padding: 20px;
                background: white;
                border: 1px solid gray;
            }
            input {
                width: 100%;
                padding: 5px;
                margin: auto;
                margin-bottom: 10px;
            }
            button {
                width: 100%;
                padding: 10px;
                background: blue;
                color: white;
                border: none;
            }

            .error {
                color: red;
            }
        </style>
        <script>
            function validate() {
                var username = document.getElementById("username").value;
                var password = document.getElementById("password").value;

                var uError = document.getElementById("userErr");
                var pError = document.getElementById("passErr");

                if (username == "") {
                    uError.innerHTML = "username needed";
                    alert("enter username");
                    return false;
                }
                if (password == "") {
                    pError.innerHTML = "pass needed";
                    alert("enter pass");
                    return false;
                }
                alert("Login Successful");
            }
        </script>
    </head>
    <body>
        <div class="container">
            <h2>Login Form</h2>
            <form onsubmit="return validate();">
                <label type="text">Username</label>
                <input type="text" id="username" />
                <div id="userErr" class="error"></div>

                <label type="text">Password</label>
                <input type="text" id="password" />
                <div id="passErr" class="error"></div>

                <button type="submit">Sign In</button>
                <br />
                <a href="registration.html">Register your account</a>
            </form>
        </div>
    </body>
</html>
