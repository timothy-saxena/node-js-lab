<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Online Books Store</title>

        <!-- Bootstrap CSS -->
        <link

        <div class="bg-light text-center p-2">
            <a href="index.html" class="mx-3 fw-bold">Home</a>

                    <div class="card text-center">

 -->
