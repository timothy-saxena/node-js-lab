<!-- registration.html -->
<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Registration</title>

        <!-- Bootstrap CSS -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
    </head>

    <body>
        <!-- Header -->
        <div class="bg-primary text-white text-center p-3">
            <h1>ONLINE BOOKS STORE</h1>
        </div>

        <!-- Simple Navigation -->
        <div class="bg-light text-center p-2">
            <a href="index.html" class="mx-3 fw-bold">Home</a>
            <a href="login.html" class="mx-3 fw-bold">Login</a>
            <a href="registration.html" class="mx-3 fw-bold">Registration</a>
            <a href="cart.html" class="mx-3 fw-bold">Cart</a>
        </div>

        <!-- Registration Form -->
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-6">
                    <div class="card p-4">
                        <h3 class="text-center mb-4">Registration Form</h3>

                        <form>
                            <div class="mb-3">
                                <label class="form-label">Name *</label>
                                <input type="text" class="form-control" />
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password *</label>
                                <input type="password" class="form-control" />
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email *</label>
                                <input type="email" class="form-control" />
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Phone Number *</label>
                                <input type="text" class="form-control" />
                            </div>

                            <!-- Gender -->
                            <div class="mb-3">
                                <label class="form-label">Gender *</label><br />
                                <div class="form-check form-check-inline">
                                    <input
                                        class="form-check-input"
                                        type="radio"
                                        name="gender"
                                    />
                                    <label class="form-check-label">Male</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input
                                        class="form-check-input"
                                        type="radio"
                                        name="gender"
                                    />
                                    <label class="form-check-label"
                                        >Female</label
                                    >
                                </div>
                            </div>

                            <!-- Languages -->
                            <div class="mb-3">
                                <label class="form-label">Language Known</label
                                ><br />
                                <div class="form-check">
                                    <input
                                        class="form-check-input"
                                        type="checkbox"
                                    />
                                    <label class="form-check-label"
                                        >English</label
                                    >
                                </div>
                                <div class="form-check">
                                    <input
                                        class="form-check-input"
                                        type="checkbox"
                                    />
                                    <label class="form-check-label"
                                        >Telugu</label
                                    >
                                </div>
                                <div class="form-check">
                                    <input
                                        class="form-check-input"
                                        type="checkbox"
                                    />
                                    <label class="form-check-label"
                                        >Hindi</label
                                    >
                                </div>
                                <div class="form-check">
                                    <input
                                        class="form-check-input"
                                        type="checkbox"
                                    />
                                    <label class="form-check-label"
                                        >Tamil</label
                                    >
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Address *</label>
                                <textarea
                                    class="form-control"
                                    rows="3"
                                ></textarea>
                            </div>

                            <div class="text-center">
                                <button
                                    type="submit"
                                    class="btn btn-primary me-2"
                                >
                                    Submit
                                </button>
                                <button type="reset" class="btn btn-secondary">
                                    Reset
                                </button>
                            </div>

                            <p class="text-danger mt-3">
                                * Fields are mandatory
                            </p>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="bg-primary text-white text-center p-2 mt-5">
            <p class="mb-0">(C) 2024 All rights reserved</p>
        </div>
    </body>
</html>
