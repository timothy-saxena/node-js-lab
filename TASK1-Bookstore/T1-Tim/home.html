<html>
    <head>
        <title>Home Page</title>
        <link rel="stylesheet" href="./styles.css" />
    </head>

    <body>
        <div class="page-wrapper">
            <div class="header-section">
                <header class="site-header">
                    <img src="./images/book-icon.png" alt="logo" class="logo" />
                    <h1>ONLINE BOOK STORE</h1>
                </header>
                <nav class="navbar">
                    <ul class="nav-list">
                        <li><a href="home.html"> Home</a></li>
                        <li><a href="login.html"> Login</a></li>
                        <li><a href="registration.html"> Registration</a></li>
                        <li><a href="cart.html"> Cart</a></li>
                    </ul>
                </nav>
            </div>
            <!-- Main Layout -->
            <div class="layout">
                <aside class="left-sidebar"></aside>
                <div class="content-area">
                    <main>
                        <div class="books">
                            <div class="book-card">
                                <img src="./images/c-book.png" />
                                <p>The C Programming Language</p>
                                <p>$19.99</p>
                                <button>Add to Cart</button>
                            </div>
                            <div class="book-card">
                                <img
                                    src="./images/java-book.png"
                                    alt="Java Book"
                                />
                                <p>Java Complete Reference</p>
                                <p>$19.99</p>
                                <button>Add to Cart</button>
                            </div>

                            <div class="book-card">
                                <img
                                    src="./images/web-tech-book.png"
                                    alt="Web Book"
                                />
                                <p>Web Technologies</p>
                                <p>$20.00</p>
                                <button>Add to Cart</button>
                            </div>

                            <div class="book-card">
                                <img src="./images/os-book.png" alt="OS Book" />
                                <p>Operating System Concepts</p>
                                <p>$18.00</p>
                                <button>Add to Cart</button>
                            </div>

                            <div class="book-card">
                                <img
                                    src="./images/cn-book.png"
                                    alt="Networks Book"
                                />
                                <p>Computer Networks</p>
                                <p>$22.00</p>
                                <button>Add to Cart</button>
                            </div>

                            <div class="book-card">
                                <img
                                    src="./images/html-book.png"
                                    alt="HTML Book"
                                />
                                <p>HTML & CSS</p>
                                <p>$17.00</p>
                                <button>Add to Cart</button>
                            </div>
                        </div>
                    </main>
                </div>

                <aside class="right-sidebar"></aside>
            </div>
            <footer></footer>
        </div>
    </body>
</html>
