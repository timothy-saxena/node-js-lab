<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Registration</title>
        <link rel="stylesheet" href="./styles.css" />
    </head>

    <body>
        <div class="page-wrapper">
            <!-- Header Section -->
            <div class="header-section">
                <header class="site-header">
                    <img src="./images/book-icon.png" alt="LOGO" class="logo" />
                    <h1>ONLINE BOOKS STORE</h1>
                </header>

                <nav class="navbar">
                    <ul class="nav-list">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="login.html">Login</a></li>
                        <li><a href="registration.html">Registration</a></li>
                        <li><a href="cart.html">Cart</a></li>
                    </ul>
                </nav>
            </div>

            <!-- Main Layout -->
            <div class="layout">
                <aside class="left-sidebar"></aside>

                <div class="content-area">
                    <main>
                        <h3 style="text-align: center; margin-bottom: 20px">
                            Registration Form
                        </h3>

                        <form name="f1">
                            <table align="center" cellpadding="10">
                                <tr>
                                    <td>Name:*</td>
                                    <td>
                                        <input type="text" name="username" />
                                    </td>
                                </tr>

                                <tr>
                                    <td>Password:*</td>
                                    <td>
                                        <input
                                            type="password"
                                            name="password"
                                        />
                                    </td>
                                </tr>

                                <tr>
                                    <td>Email ID:*</td>
                                    <td><input type="email" name="email" /></td>
                                </tr>

                                <tr>
                                    <td>Phone Number:*</td>
                                    <td><input type="text" name="phno" /></td>
                                </tr>

                                <tr>
                                    <td>Gender:*</td>
                                    <td>
                                        <input
                                            type="radio"
                                            name="gender"
                                            value="Male"
                                        />
                                        Male
                                        <input
                                            type="radio"
                                            name="gender"
                                            value="Female"
                                        />
                                        Female
                                    </td>
                                </tr>

                                <tr>
                                    <td>Language Known:</td>
                                    <td>
                                        <input
                                            type="checkbox"
                                            value="English"
                                        />
                                        English<br />
                                        <input type="checkbox" value="Telugu" />
                                        Telugu<br />
                                        <input type="checkbox" value="Hindi" />
                                        Hindi<br />
                                        <input type="checkbox" value="Tamil" />
                                        Tamil
                                    </td>
                                </tr>

                                <tr>
                                    <td valign="top">Address:*</td>
                                    <td>
                                        <textarea
                                            name="address"
                                            rows="3"
                                            cols="20"
                                        ></textarea>
                                    </td>
                                </tr>

                                <tr>
                                    <td></td>
                                    <td>
                                        <input type="submit" value="Submit" />
                                        <input type="reset" value="Reset" />
                                    </td>
                                </tr>

                                <tr>
                                    <td colspan="2">
                                        <span style="color: red"
                                            >* Fields are mandatory</span
                                        >
                                    </td>
                                </tr>
                            </table>
                        </form>
                    </main>
                </div>

                <aside class="right-sidebar"></aside>
            </div>

            <!-- Footer -->
            <footer>
                <p>(C) 2024 All rights reserved by Online Books Store</p>
            </footer>
        </div>
    </body>
</html>
