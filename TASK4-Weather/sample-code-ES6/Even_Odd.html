<html>
    <body>
        <script>
            function evenodd(num) {
                return new Promise((resolve, reject) => {
                    if (!Number.isInteger(num)) {
                        reject("Invalid input: not an integer");
                        return;
                    }
                    if (num % 2 === 0) {
                        resolve(`${num} is Even`);
                    } else {
                        resolve(`${num} is Odd`); // ✅ Fixed: was reject(), now resolve()
                    }
                });
            }

            evenodd(4)
                .then((result) => {
                    document.write("<br>Success: " + result);
                })
                .catch((error) => {
                    document.write("<br>Error: " + error);
                });

            evenodd(7)
                .then((result) => {
                    document.write("<br>Success: " + result);
                })
                .catch((error) => {
                    document.write("<br>Error: " + error);
                });

            evenodd(3.14)
                .then((result) => {
                    document.write("<br>Success: " + result);
                })
                .catch((error) => {
                    document.write("<br>Error: " + error);
                });
        </script>
    </body>
</html>
